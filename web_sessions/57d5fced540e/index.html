<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px;
  }
  .app-container {
    background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 100%; max-width: 520px; margin-top: 40px; overflow: hidden;
  }
  .app-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; padding: 28px 24px; text-align: center;
  }
  .app-header h1 { font-size: 1.8rem; font-weight: 700; }
  .app-header .subtitle { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
  .input-section { display: flex; gap: 10px; padding: 20px 24px; border-bottom: 1px solid #eee; }
  .input-section input {
    flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .input-section input:focus { border-color: #667eea; }
  .btn-add {
    background: #667eea; color: white; border: none; padding: 12px 20px;
    border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .btn-add:hover { background: #5a6fd6; }
  .btn-add:active { transform: scale(0.96); }
  .filters { display: flex; gap: 4px; padding: 12px 24px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
  .filter-btn {
    background: transparent; border: 1px solid #ddd; padding: 7px 14px;
    border-radius: 20px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; color: #666;
  }
  .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
  .filter-btn:hover:not(.active) { background: #f5f5f5; }
  .task-list { list-style: none; max-height: 400px; overflow-y: auto; }
  .task-list li {
    display: flex; align-items: center; gap: 12px; padding: 14px 24px;
    border-bottom: 1px solid #f0f0f0; transition: background 0.15s; animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .task-list li:hover { background: #fafafa; }
  .task-list li.completed .task-text { text-decoration: line-through; color: #bbb; }
  .task-checkbox {
    width: 22px; height: 22px; border: 2px solid #ccc; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
  }
  .task-checkbox:hover { border-color: #667eea; }
  .task-list li.completed .task-checkbox { background: #667eea; border-color: #667eea; }
  .task-list li.completed .task-checkbox::after { content: '✓'; color: white; font-size: 0.75rem; font-weight: bold; }
  .task-text { flex: 1; font-size: 1rem; word-break: break-word; }
  .btn-delete {
    background: transparent; border: none; color: #ccc; font-size: 1.1rem;
    cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-delete:hover { color: #e74c3c; background: #fff0f0; }
  .footer-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; color: #888; font-size: 0.85rem; }
  .btn-clear { background: transparent; border: none; color: #888; cursor: pointer; font-size: 0.85rem; transition: color 0.2s; }
  .btn-clear:hover { color: #e74c3c; }
  .empty-state { text-align: center; padding: 48px 24px; color: #ccc; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; }

  @media (max-width: 480px) {
    .app-container { margin-top: 10px; border-radius: 12px; }
    .app-header h1 { font-size: 1.4rem; }
    .input-section { flex-direction: column; gap: 8px; }
    .input-section input { width: 100%; }
    .btn-add { width: 100%; padding: 14px; }
    .filters { justify-content: center; }
    .filter-btn { flex: 1; text-align: center; }
    .task-list li { padding: 12px 16px; }
    .footer-bar { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <h1>✅ To-Do List</h1>
    <p class="subtitle">Stay organized, get things done</p>
  </div>
  <div class="input-section">
    <input type="text" id="taskInput" placeholder="What needs to be done?" aria-label="New task input" maxlength="200">
    <button class="btn-add" id="btnAdd" aria-label="Add task">+ Add</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>
  <ul class="task-list" id="taskList" aria-label="Task list"></ul>
  <div class="empty-state" id="emptyState">
    <div class="icon">📋</div>
    <p>No tasks yet. Add one above!</p>
  </div>
  <div class="footer-bar">
    <span id="taskCount">0 tasks remaining</span>
    <button class="btn-clear" id="btnClearCompleted">Clear completed</button>
  </div>
</div>

<script>
(function() {
  const taskInput = document.getElementById('taskInput');
  const btnAdd = document.getElementById('btnAdd');
  const taskList = document.getElementById('taskList');
  const emptyState = document.getElementById('emptyState');
  const taskCount = document.getElementById('taskCount');
  const btnClearCompleted = document.getElementById('btnClearCompleted');
  const filterBtns = document.querySelectorAll('.filter-btn');

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let currentFilter = 'all';

  function saveTasks() { localStorage.setItem('tasks', JSON.stringify(tasks)); }

  function render() {
    taskList.innerHTML = '';
    let filtered = tasks;
    if (currentFilter === 'active') filtered = tasks.filter(t => !t.completed);
    else if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);

    if (filtered.length === 0) {
      emptyState.style.display = 'block';
      if (currentFilter === 'completed') emptyState.querySelector('p').textContent = 'No completed tasks.';
      else if (currentFilter === 'active') emptyState.querySelector('p').textContent = 'All tasks done! 🎉';
      else emptyState.querySelector('p').textContent = 'No tasks yet. Add one above!';
    } else { emptyState.style.display = 'none'; }

    filtered.forEach(task => {
      const li = document.createElement('li');
      if (task.completed) li.classList.add('completed');
      const cb = document.createElement('div');
      cb.className = 'task-checkbox';
      cb.setAttribute('aria-label', task.completed ? 'Mark incomplete' : 'Mark complete');
      cb.addEventListener('click', () => { task.completed = !task.completed; render(); });
      const txt = document.createElement('span');
      txt.className = 'task-text';
      txt.textContent = task.text;
      const del = document.createElement('button');
      del.className = 'btn-delete';
      del.innerHTML = '🗑';
      del.setAttribute('aria-label', 'Delete task');
      del.addEventListener('click', () => { tasks = tasks.filter(t => t.id !== task.id); render(); });
      li.appendChild(cb); li.appendChild(txt); li.appendChild(del);
      taskList.appendChild(li);
    });

    const remaining = tasks.filter(t => !t.completed).length;
    taskCount.textContent = remaining + (remaining === 1 ? ' task remaining' : ' tasks remaining');
    saveTasks();
  }

  function addTask(text) {
    if (!text.trim()) return;
    tasks.push({ id: Date.now(), text: text.trim(), completed: false });
    taskInput.value = ''; taskInput.focus(); render();
  }

  btnAdd.addEventListener('click', () => addTask(taskInput.value));
  taskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(taskInput.value); });
  btnClearCompleted.addEventListener('click', () => { tasks = tasks.filter(t => !t.completed); render(); });
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });
  render();
})();
</script>
</body>
</html>
