<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 My Tasks</h1>
      <p class="subtitle">Stay organized, get things done.</p>
    </header>

    <div class="input-group">
      <input
        type="text"
        id="taskInput"
        placeholder="What needs to be done?"
        autocomplete="off"
      />
      <button id="addBtn" title="Add task">+ Add</button>
    </div>

    <ul id="taskList" class="task-list">
      <!-- Tasks rendered by JS -->
    </ul>

    <footer>
      <span id="taskCount">0 tasks remaining</span>
      <button id="clearCompletedBtn" class="clear-btn">Clear completed</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
